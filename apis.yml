  - type: Features
    data:
      - name: Dev Environments
        description: >-
          Cloud-based development environments pre-configured with your project code and tools enabling instant
          onboarding and eliminating local setup friction.
      - name: Source Repositories
        description: >-
          Built-in Git repositories for hosting and managing source code with branching, pull requests, and code
          review capabilities.
      - name: CI/CD Workflows
        description: >-
          Visual workflow builder for creating automated build, test, and deployment pipelines with native AWS
          service integrations.
      - name: Project Management
        description: >-
          Integrated issue tracking and project boards for organizing work, tracking bugs, and managing feature
          development alongside code.
      - name: Spaces
        description: >-
          Organizational units for grouping projects and managing team membership, billing, and resource access
          across an organization.
      - name: Third-Party Integrations
        description: >-
          Connect to GitHub repositories, Jira, Slack, and other third-party tools to incorporate CodeCatalyst
          into existing development workflows.
  - type: UseCases
    data:
      - name: Rapid Developer Onboarding
        description: >-
          Use Dev Environments to eliminate local development setup time, allowing new developers to be
          productive within minutes on any project.
      - name: Standardized CI/CD Pipelines
        description: >-
          Create and enforce consistent build, test, and deployment workflows across all projects in a space,
          reducing inconsistency and manual pipeline maintenance.
      - name: Collaborative Code Development
        description: >-
          Enable distributed teams to collaborate on source code through integrated repositories, pull requests,
          and code review workflows.
  - type: Integrations
    data:
      - name: GitHub
        description: Connect GitHub repositories to CodeCatalyst projects and sync code.
      - name: Jira
        description: Link CodeCatalyst issues with Jira for unified project tracking.
      - name: Slack
        description: Receive CodeCatalyst notifications and workflow status updates in Slack.
      - name: Amazon Q Developer
        description: AI coding assistance integrated into Dev Environments and code reviews.
      - name: AWS Lambda
        description: Deploy serverless functions as part of CodeCatalyst CI/CD workflows.
      - name: Amazon ECS
        description: Deploy containerized applications to ECS from CodeCatalyst pipelines.
      - name: AWS CloudFormation
        description: Deploy infrastructure as code using CloudFormation actions in workflows.
