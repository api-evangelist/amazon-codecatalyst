aid: amazon-codecatalyst
name: Amazon CodeCatalyst
description: >-
  Amazon CodeCatalyst is a unified software development service that helps teams collaborate more effectively on
  software projects. It provides integrated tools for source code management, CI/CD workflows, issue tracking, and
  cloud-based development environments (Dev Environments). Teams can use CodeCatalyst to accelerate development
  velocity, standardize workflows, and integrate natively with AWS services and third-party tools.
