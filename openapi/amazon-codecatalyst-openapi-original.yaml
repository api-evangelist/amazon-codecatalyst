          - description: 'The Amazon EC2 instace type to use for the Dev Environment. '
        inactivityTimeoutMinutes:
          allOf:
          - $ref: '#/components/schemas/InactivityTimeoutMinutes'
          - description: 'The amount of time the Dev Environment will run without any activity detected before stopping, in minutes. Only whole integers are allowed. Dev Environments consume compute minutes
              when running.'
        persistentStorage:
          allOf:
          - $ref: '#/components/schemas/PersistentStorageConfiguration'
          - description: '<p>Information about the amount of storage allocated to the Dev Environment. </p> <note> <p>By default, a Dev Environment is configured to have 16GB of persistent storage when
              created from the Amazon CodeCatalyst console, but there is no default when programmatically creating a Dev Environment. Valid values for persistent storage are based on memory sizes in 16GB
              increments. Valid values are 16, 32, and 64.</p> </note>'
