  /v1/accessTokens:
    put:
      operationId: CreateAccessToken
      description: 'Creates a personal access token (PAT) for the current user. A personal access token (PAT) is similar to a password. It is associated with your user identity for use across all spaces
        and projects in Amazon CodeCatalyst. You use PATs to access CodeCatalyst from resources that include integrated development environments (IDEs) and Git-based source repositories. PATs represent
        you in Amazon CodeCatalyst and you can manage them in your user settings.For more information, see <a href="https://docs.aws.amazon.com/codecatalyst/latest/userguide/ipa-tokens-keys.html">Managing
        personal access tokens in Amazon CodeCatalyst</a>.'
      responses:
        '201':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateAccessTokenResponse'
              examples:
                CreateAccessToken201Example:
                  summary: Default CreateAccessToken 201 response
                  x-microcks-default: true
                  value:
                    secret: example-value
                    name: example-resource
                    expiresTime: example-value
                    accessTokenId: '500123'
        '480':
          description: ThrottlingException
