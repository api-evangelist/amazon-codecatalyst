      parameters:
      - name: spaceName
        in: path
        required: true
        description: The name of the space.
        schema:
          type: string
          pattern: '[a-zA-Z0-9]+(?:[-_\.][a-zA-Z0-9]+)*'
          minLength: 3
          maxLength: 63
      - name: projectName
        in: path
        required: true
        description: The name of the project in the space.
        schema:
          type: string
          pattern: '[a-zA-Z0-9]+(?:[-_\.][a-zA-Z0-9]+)*'
          minLength: 3
          maxLength: 63
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - instanceType
              - persistentStorage
              properties:
                repositories:
                  description: 'The source repository that contains the branch to clone into the Dev Environment. '
                  type: array
                  items:
                    $ref: '#/components/schemas/RepositoryInput'
                clientToken:
                  description: 'A user-specified idempotency token. Idempotency ensures that an API request completes only once. With an idempotent request, if the original request completes successfully,
                    the subsequent retries return the result from the original successful request and have no additional effect.'
                  type: string
                  minLength: 1
                  maxLength: 1024
                alias:
                  description: The user-defined alias for a Dev Environment.
                  type: string
                  pattern: '[a-zA-Z0-9]+(?:[-_\.][a-zA-Z0-9]+)*'
                  minLength: 1
                  maxLength: 128
                ides:
                  description: '<p>Information about the integrated development environment (IDE) configured for a Dev Environment.</p> <note> <p>An IDE is required to create a Dev Environment. For Dev
                    Environment creation, this field contains configuration information and must be provided. </p> </note>'
                  type: array
                  items:
                    $ref: '#/components/schemas/IdeConfiguration'
                  minItems: 0
                  maxItems: 1
                instanceType:
                  description: 'The Amazon EC2 instace type to use for the Dev Environment. '
                  type: string
                  enum:
                  - dev.standard1.small
                  - dev.standard1.medium
                  - dev.standard1.large
                  - dev.standard1.xlarge
                inactivityTimeoutMinutes:
                  description: 'The amount of time the Dev Environment will run without any activity detected before stopping, in minutes. Only whole integers are allowed. Dev Environments consume compute
                    minutes when running.'
                  type: integer
                  minimum: 0
                  maximum: 1200
                persistentStorage:
                  description: 'Information about the configuration of persistent storage for a Dev Environment. '
                  type: object
                  properties:
                    sizeInGiB:
                      allOf:
                      - $ref: '#/components/schemas/PersistentStorageConfigurationSizeInGiBInteger'
                      - description: '<p>The size of the persistent storage in gigabytes (specifically GiB).</p> <note> <p>Valid values for storage are based on memory sizes in 16GB increments. Valid values
                          are 16, 32, and 64.</p> </note>'
            examples:
              CreateDevEnvironmentRequestExample:
                summary: Default CreateDevEnvironment request
                x-microcks-default: true
                value:
                  repositories:
                  - repositoryName: example-resource
                    branchName: example-resource
                  clientToken: example-value
                  alias: example-value
                  ides:
                  - runtime: example-value
                    name: example-resource
                  instanceType: dev.standard1.small
                  inactivityTimeoutMinutes: 1718153645993
                  persistentStorage:
                    sizeInGiB: example-value
      summary: Amazon CodeCatalyst Create Dev Environment
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
