  '/v1/spaces/{spaceName}/projects/{projectName}/devEnvironments':
    put:
      operationId: CreateDevEnvironment
      description: '<p>Creates a Dev Environment in Amazon CodeCatalyst, a cloud-based development environment that you can use to quickly work on the code stored in the source repositories of your project.
        </p> <note> <p>When created in the Amazon CodeCatalyst console, by default a Dev Environment is configured to have a 2 core processor, 4GB of RAM, and 16GB of persistent storage. None of these defaults
        apply to a Dev Environment created programmatically.</p> </note>'
      responses:
        '201':
          description: Success
          content:
